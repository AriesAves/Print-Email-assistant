
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintAssist AI - Email Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #475569;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a2e 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        select, textarea, input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        select:focus, textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        textarea {
            min-height: 150px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--secondary) 0%, #059669 100%);
            color: white;
        }

        .agent-selector-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .agent-selector-container select {
            flex: 1;
        }

        .btn-icon {
            padding: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .btn-add {
            background: var(--secondary);
            color: white;
        }

        .btn-add:hover {
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .status-btn {
            padding: 15px 10px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .status-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .status-btn.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.2);
        }

        .status-paid { border-left: 4px solid var(--secondary); }
        .status-unpaid { border-left: 4px solid var(--accent); }
        .status-proof { border-left: 4px solid var(--primary); }
        .status-collection { border-left: 4px solid var(--danger); }

        .results-section {
            margin-top: 30px;
        }

        .result-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-info { background: rgba(99, 102, 241, 0.2); color: var(--primary); }
        .badge-success { background: rgba(16, 185, 129, 0.2); color: var(--secondary); }
        .badge-warning { background: rgba(245, 158, 11, 0.2); color: var(--accent); }
        .badge-danger { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .result-content {
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .result-content h4 {
            color: var(--text-primary);
            margin: 15px 0 10px 0;
            font-size: 1rem;
        }

        .result-content ul {
            padding-left: 20px;
            margin: 10px 0;
        }

        .result-content li {
            margin-bottom: 8px;
        }

        .info-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
        }

        .info-box.warning {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .info-box.danger {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .turnaround-box {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(99, 102, 241, 0.1) 100%);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }

        .turnaround-title {
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .turnaround-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .turnaround-item {
            background: var(--bg-input);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .reminder-box {
            background: rgba(239, 68, 68, 0.1);
            border: 2px solid var(--danger);
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
        }

        .reminder-title {
            font-weight: 600;
            color: var(--danger);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-btn {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .copy-btn:hover {
            background: var(--border);
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--bg-input);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .website-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .website-card {
            background: var(--bg-input);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .product-category {
            display: inline-block;
            background: var(--bg-input);
            padding: 6px 12px;
            border-radius: 20px;
            margin: 4px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .icon {
            width: 20px;
            height: 20px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .status-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .action-buttons {
                flex-direction: column;
            }

            .website-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
                PrintAssist AI
            </h1>
            <p>AI-Powered Email Assistant for Printing Services</p>
        </div>

        <div class="main-grid">
            <!-- Left Column - Input Form -->
            <div class="left-column">
                <div class="card">
                    <div class="card-title">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                        </svg>
                        Customer Issue Details
                    </div>

                    <div class="form-group">
                        <label>Website</label>
                        <select id="websiteSelect" onchange="updateProducts()">
                            <option value="">Select a printing website...</option>
                            <option value="signs">Signs.com</option>
                            <option value="uprinting">UPrinting</option>
                            <option value="nextdayflyers">NextDayFlyers</option>
                            <option value="48hourprint">48HourPrint</option>
                            <option value="printplace">PrintPlace</option>
                            <option value="24hrprint">24HrPrint</option>
                            <option value="packola">Packola</option>
                            <option value="logosoftwear">LogoSoftwear</option>
                        </select>
						   <div class="form-group">
                        <label>Issue</label>
                        <select id="issueSelect" onchange="updateIssue()">
                            <option value="">Select issue...</option>
                            <option value="issue">offize</option>
                            <option value="issue">color</option>
                            <option value="issue">Orientation</option>
                            <option value="issue">Large spce</option>
                            <option value="issue">White ink options</option>
                            <option value="issue">Did not match the template</option>
                            <option value="issue">Deleivery Ddate will not met</option>
                            <option value="issue">Low quality</option>
                        </select>
							   <div class="form-group">
                        <label>Order Status</label>
                        <select id="statusSelect" onchange="updateStatus()">
                            <option value="">Order status</option>
                            <option value="Order Status">On Hold</option>
                            <option value="Order Status">For collection</option>
                            <option value="Order Status">For Proofing</option>
                            <option value="Order Status">Proof Sent</option>
                            <option value="Order Status">Approve status</option>
							<option value="Order Status">Gang</option>
							<option value="Order Status">Printing</option>
							<option value="Order Status">Packed</option>
							<option value="Order Status">In Transit</option>
							<option value="Order Status">Shipped</option>
                          </select>
                                <div class="form-group">
                        <label>Product Type</label>
                        <select id="productSelect">
                            <option value="">Select soltion...</option>
                        </select>
								<div class="form-group">
						  <label>Solution</label>
                        <select id="solutionSelect" onchange="updateSolution()">
                            <option value="">Solution</option>
                            <option value="solution">upload new file</option>
                            <option value="solution">review the proof</option>
							<option value="solution">change order size</option>
							<option value="solution">update material</option>
							<option value="solution">upgrade shipping</option>
                           </select>
                    </div>

                    <div class="form-group">
                        <label>Agent Name</label>
                        <div class="agent-selector-container">
                            <select id="agentSelect">
                                <option value="">Select agent...</option>
                                <option value="Sarah M.">Sarah M.</option>
                                <option value="John D.">John D.</option>
                                <option value="Emily R.">Emily R.</option>
                                <option value="Michael T.">Michael T.</option>
                                <option value="Jessica L.">Jessica L.</option>
                            </select>
                            <button class="btn-icon btn-add" onclick="openAddAgentModal()" title="Add Agent">
                                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 5v14M5 12h14"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Issue Description / Notes</label>
                        <textarea id="issueNotes" placeholder="Describe the customer's issue in detail. Include order numbers, product specifications, and any specific concerns..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Order Status</label>
                        <div class="status-grid">
                            <button class="status-btn status-paid" data-status="paid" onclick="selectStatus(this)">PAID</button>
                            <button class="status-btn status-unpaid" data-status="unpaid" onclick="selectStatus(this)">UNPAID</button>
                            <button class="status-btn status-proof" data-status="proof_unpaid" onclick="selectStatus(this)">Proof Sent Unpaid</button>
                            <button class="status-btn status-proof" data-status="proof_paid" onclick="selectStatus(this)">Proof Sent PAID</button>
                            <button class="status-btn status-collection" data-status="collection" onclick="selectStatus(this)">For Collection</button>
                            <button class="status-btn" data-status="none" onclick="selectStatus(this)">None</button>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="generateResolution()">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2a10 10 0 1 0 10 10H12V2z"/>
                                <path d="M20 12a8 8 0 1 1-16 0"/>
                            </svg>
                            Generate AI Resolution
                        </button>
                        <button class="btn btn-secondary" onclick="clearForm()">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                            </svg>
                            Clear
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Column - Website Info & Results -->
            <div class="right-column">
                <div class="card" id="websiteInfoCard" style="display: none;">
                    <div class="card-title">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 16v-4M12 8h.01"/>
                        </svg>
                        Website Information
                    </div>
                    <div id="websiteInfo"></div>
                </div>

                <div class="card" id="resultsCard" style="display: none;">
                    <div class="result-header">
                        <div class="result-title">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                            </svg>
                            AI Resolution
                        </div>
                        <button class="copy-btn" onclick="copyToClipboard()">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                            Copy
                        </button>
                    </div>
                    <div id="resultsContent"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Agent Modal -->
    <div class="modal" id="addAgentModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Add New Agent</div>
                <button class="modal-close" onclick="closeAddAgentModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>Agent Name</label>
                <input type="text" id="newAgentName" placeholder="Enter agent name...">
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="addAgent()">Add Agent</button>
                <button class="btn btn-secondary" onclick="closeAddAgentModal()">Cancel</button>
            </div>
        </div>
    </div>

        function analyzeIssue(issue) {
            const issueLower = issue.toLowerCase();
            const matches = [];

            for (const [category, data] of Object.entries(aiKnowledge)) {
                for (const keyword of data.keywords) {
                    if (issueLower.includes(keyword)) {
                        matches.push({ category, keyword });
                    }
                }
            }

            return matches;
        }

        function generateResolution() {
            const website = document.getElementById('websiteSelect').value;
            const product = document.getElementById('productSelect').value;
            const agent = document.getElementById('agentSelect').value;
            const issue = document.getElementById('issueNotes').value.trim();

            if (!website || !issue) {
                alert('Please select a website and enter issue details.');
                return;
            }

            const resultsCard = document.getElementById('resultsCard');
            const resultsContent = document.getElementById('resultsContent');
            resultsCard.style.display = 'block';

            resultsContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Analyzing issue and generating resolution...</p></div>';

            // Simulate AI processing delay
            setTimeout(() => {
                const siteData = websiteData[website];
                const issueMatches = analyzeIssue(issue);

                let resolution = '';

                // Header

                    <div class="badge badge-info">${siteData.name}</div>

                </div>`;

                // Website-specific Info
                resolution += `<div class="result-card">
                    <div class="result-title">

                    <div class="info-box" style="margin-top: 15px;">
                        <h4>Customer Support</h4>
                        <p><strong>Phone:</strong> ${siteData.phone}</p>
                        <p><strong>Hours:</strong> ${siteData.hours}</p>
                    </div>
                </div>`;

                // AI Recommendations
                let recommendations = [];
                for (const match of issueMatches) {
                    const categoryData = aiKnowledge[match.category];
                    recommendations = recommendations.concat(categoryData.solutions.general);
                    recommendations = recommendations.concat(
                        Object.values(categoryData.solutions.specific)
                            .filter(s => issue.toLowerCase().includes(s.split(':')[0].toLowerCase()) || match.keyword.includes(s.split(':')[0]))
                    );
                }

                // Add general recommendations if no specific matches
                if (recommendations.length === 0) {
                    recommendations = [
                        "Please review our FAQ section for common answers",
                        "Our support team is available to assist with any questions",
                        "Check your order status in your account dashboard",
                        "Refer to our design guidelines for artwork specifications"
                    ];

                recommendations = [...new Set(recommendations)].slice(0, 8);

                resolution += `<div class="result-card">

                        <ul>

                    </div>

                    let reminderContent = '';
                    let reminderType = '';

                    switch (selectedStatus) {
                        case 'paid':
                            reminderContent = 'Order is fully paid. Confirm production has started and provide expected completion date.';
                            reminderType = 'info';
                            break;
                        case 'unpaid':
                            reminderContent = 'URGENT: Order payment is pending. Contact customer to complete payment before production can begin.';
                            reminderType = 'danger';
                            break;
                        case 'proof_unpaid':
                            reminderContent = 'Proof has been sent but payment is pending. Remind customer to approve proof and complete payment.';
                            reminderType = 'warning';
                            break;
                        case 'proof_paid':
                            reminderContent = 'Proof sent and payment received. Production will begin once proof is approved. Follow up for proof approval.';
                            reminderType = 'success';
                            break;
                        case 'collection':
                            reminderContent = 'Order is for collection. Verify if customer has been notified for pickup and confirm readiness status.';
                            reminderType = 'danger';
                            break;

                        <p style="margin-top: 10px;">If you have any further questions or need additional assistance, please don't hesitate to reach out. We appreciate your business and look forward to serving you.</p>
                        <p style="margin-top: 10px;">Best regards,<br>${agent || 'Customer Support Team'}<br>${siteData.name}</p>
                    </div>
                </div>`;

                resultsContent.innerHTML = resolution;

            }, 1500);

        function getIssueContext(category) {
            const contexts = {
                artwork: "this appears to be related to artwork or design specifications. Our free artwork check service can help ensure your files are print-ready.",
                shipping: "this relates to shipping or delivery concerns. We can check the status of your shipment and provide tracking updates.",
                production: "this is regarding production or print quality. Our quality assurance team will review this immediately.",

            return contexts[category] || "we want to ensure you have all the information needed.";

            const guidance = {

                uprinting: "UPrinting provides free artwork checks and 33 quality checkpoints to ensure your print job is perfect.",
                nextdayflyers: "NextDayFlyers guarantees 99.8% on-time delivery. Same-day and next-day printing options are available.",

            return guidance[website] || "We're committed to providing excellent service and quality products.";

        function copyToClipboard() {
            const content = document.getElementById('resultsContent').innerText;
            navigator.clipboard.writeText(content).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.innerHTML = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Copied!';
                setTimeout(() => {
                    btn.innerHTML = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy';

        function clearForm() {
            document.getElementById('websiteSelect').value = '';
            document.getElementById('productSelect').innerHTML = '<option value="">Select product type...</option>';
